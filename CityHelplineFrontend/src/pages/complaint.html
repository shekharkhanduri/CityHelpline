<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CityFix — File a Complaint</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/complaint.css"/>
  
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <span class="logo">🏙️ City Helpline</span>
    </div>
    <nav class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <a href="complaint.html" class="nav-link nav-link-cta active-cta">+ File Complaint</a>
    </nav>
    <div class="nav-right">
      <span class="nav-username" id="nav-username">Hey, User 👋</span>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>
  </header>

  <main class="form-layout">
    <div>
      <h1 class="page-heading">File a Complaint</h1>
      <p class="page-subheading">Report a city issue — we'll make sure the right people see it.</p>
    </div>

    <div class="form-card">

      <!-- Category — required by server -->
      <div class="form-group">
       <label for="c-category">Category <span>*</span></label>
        <select id="c-category">
          <option value="">— Select a category —</option>
          <option value="1">Damaged Road issues</option>
          <option value="2">Pothole Issues</option>
          <option value="3">Illegal Parking Issues</option>
          <option value="4">Broken Road Sign Issues</option>
          <option value="5">Fallen trees</option>
          <option value="6">Littering/Garbage on Public Places</option>
          <option value="7">Vandalism Issues</option>
          <option value="8">Dead Animal Pollution</option>
          <option value="9">Damaged concrete structures</option>
          <option value="10">Damaged Electric wires and poles</option>
        </select>
      </div>

      <!-- Description — required by server (min 20 chars) -->
      <div class="form-group">
        <label for="c-desc">Description <span>*</span></label>
        <textarea id="c-desc"
          placeholder="Describe the issue in detail — what it is, how long it's been there, how it affects people… (min 20 characters)">
        </textarea>
      </div>

      <!-- Image upload — required by server (postComplaintWithImage) -->
      <div class="form-group">
        <label>Photo of the Issue <span>*</span></label>
        <div class="image-upload-area" id="upload-area">
          <input type="file" id="c-image" accept="image/*"/>
          <div class="upload-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <p class="upload-text">Click to upload or drag & drop</p>
          <p class="upload-hint">JPG, PNG, WEBP — max 5MB</p>
        </div>
        <div id="image-preview">
          <img id="preview-img" src="" alt="Preview"/>
          <button id="remove-image" type="button">✕</button>
        </div>
      </div>

      <!-- Map location picker — lat/long sent to server -->
      <div class="form-group">
        <div class="map-label-row">
          <label>Location <span>*</span></label>
          <span class="map-hint-tag">Auto-detected</span>
        </div>
        <div id="pick-map"></div>
        <p class="coords-display">
          Coordinates: <span id="coords-text">Detecting your location…</span>
        </p>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="submit-btn" type="button">Submit Complaint</button>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="../js/complaint.js"></script>
</body>
</html>
