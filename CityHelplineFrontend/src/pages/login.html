<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Login</title>

        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
        <link href="../css/auth.css" rel="stylesheet"/>
    </head>

    <body>

        <div class="authPage">
        
            <div class="authLeft">

                <div class="card">
                    <div class="cardHeader">
                        <div class="logo">City Helpline</div>
                        <h1>Login</h1>
                    </div>

                    <div id="message" class="message"></div>

                    <form id="loginForm" >

                        <div class="field">
                            <label for="email">Email Address</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="rawat@example.com"
                                required
                                autocomplete="email"
                            />
                        </div>

                
                        <div class="field">
                            <label for="password">Password</label>
                            <div class="input-with-action">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    placeholder="Min. 6 characters"
                                    required
                                    minlength="6"
                                    autocomplete="current-password"
                                />
                                <button type="button" class="input-action-btn" data-toggle-password="#password" aria-label="Show password">
                                    Show
                                </button>
                            </div>
                            <p class="hint">Use at least 6 characters.</p>
                        </div>

                        <button type="submit" class="primaryBtn" id="loginBtn">Login</button>
                        
                    </form>
                    <div class="card-footer">
                        Don't have an account? <a href="register.html">Signup</a>
                    </div>

                </div>
                <!--card end-->
            </div>

            <div class="authRight">
                <img src="../assets/finatAuth3.svg" alt="image">
            </div>
        </div>
        
        <script type="module" src="../js/login.js"></script>
    </body>
</html>
