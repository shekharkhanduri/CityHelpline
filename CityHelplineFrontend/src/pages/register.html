<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Register</title>

        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
        <link href="../css/auth.css" rel="stylesheet"/>
    </head>

    <body>
        <div class="authPage">

            <div class="authLeft">

                <div class="card">
                    <div class="cardHeader">
                        <div class="logo">City Helpline</div>
                        <h1>Create an account</h1>
                    </div>

                    <div id="message" class="message"></div>

                    <form id="signupForm" >

                        
                        <div class="field">
                            <label for="username">Full Name</label>
                            <input
                                type="text"
                                id="username"
                                name="name"
                                placeholder="Aryan Rawat"
                                required
                                autocomplete="name"
                            />
                        </div>

                        
                        <div class="field">
                            <label for="email">Email Address</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="rawat@example.com"
                                required
                                autocomplete="email"
                            />
                        </div>

                
                        <div class="field">
                            <label for="password">Password</label>
                            <div class="input-with-action">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    placeholder="Min. 6 characters"
                                    required
                                    minlength="6"
                                    autocomplete="new-password"
                                />
                                <button type="button" class="input-action-btn" data-toggle-password="#password" aria-label="Show password">
                                    Show
                                </button>
                            </div>
                            <p class="hint">Use at least 6 characters.</p>
                        </div>

                    
                        <div class="field">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="input-with-action">
                                <input
                                    type="password"
                                    id="confirmPassword"
                                    name="confirmPassword"
                                    placeholder="Repeat your password"
                                    required
                                    minlength="6"
                                    autocomplete="new-password"
                                />
                                <button type="button" class="input-action-btn" data-toggle-password="#confirmPassword" aria-label="Show confirm password">
                                    Show
                                </button>
                            </div>

                        </div>

                        <button type="submit" class="primaryBtn" id="submitBtn">Create Account</button>
                        
                    </form>
                    <div class="card-footer">
                        Already have an account? <a href="login.html">Log in</a>
                    </div>

                </div>
                <!--card end-->
            </div>

        
            <div class="authRight">

                <img src="../assets/finatAuth3.svg" alt="image">
                
            </div>

        </div>


        <script type="module" src="../js/register.js"></script>
    </body>
</html>
