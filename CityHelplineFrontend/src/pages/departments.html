<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Departments — MuniCMS Admin</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav class="nav">
  <span class="nav-brand">🏙️ City Helpline</span>
  <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
  <a href="complaints.html" class="nav-link">Complaints</a>
  <a href="departments.html" class="nav-link active">Departments</a>
  <div class="nav-spacer"></div>
  <span class="nav-user" id="nav-user"></span>
  <button id="logout-btn" class="btn btn-sm btn-secondary" >Logout</button>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Departments</div>
      <div class="page-subtitle" id="dept-count">—</div>
    </div>
    <button class="btn btn-primary" id="btn-add-dept">+ Add Department</button>
  </div>

  <div class="table-wrap">
    <div id="dept-list">
      <div class="loading"><div class="spinner"></div>Loading departments...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Department</div>
    <div id="form-msg"></div>
    <form id="dept-form">
      <div class="form-group">
        <label for="field-name">Department Name *</label>
        <input type="text" id="field-name" placeholder="e.g. Roads & Infrastructure" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="field-desc">Description</label>
        <textarea id="field-desc" rows="3" placeholder="Brief description of responsibilities..."></textarea>
      </div>
      <div class="form-group">
        <label for="field-head">Head Email</label>
        <input type="email" id="field-head" placeholder="head@municipality.gov" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="modal-submit">Save</button>
      </div>
    </form>
  </div>
</div>



<script type="module" src="../js/departments.js"></script>


</body>
</html>
